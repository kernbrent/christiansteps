<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Mission Devotional</title>

<link href="Styles/Site.css" rel="stylesheet" />
<link href="Styles/Site_mobile.css" rel="stylesheet" />

<style>

.devotional-container{
    max-width:1100px;
    margin:0 auto;
}

.devotional-hero img{
    width:100%;
    height:320px;
    object-fit:cover;
    border-radius:16px;
    margin-bottom:25px;
}

.devotional-card{
    background:white;
    border-radius:16px;
    padding:30px;
    box-shadow:0 4px 14px rgba(0,0,0,.08);
    margin-bottom:25px;
}

.devotional-title{
    font-size:38px;
    margin-bottom:10px;
}

.devotional-meta{
    color:#666;
    margin-bottom:25px;
}

.devotional-content{
    line-height:1.8;
    font-size:17px;
}

.devotional-content p{
    margin-bottom:18px;
}

.day-image-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:18px;
    margin-top:25px;
}

.day-image-card{
    background:white;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.day-image-card img{
    width:100%;
    height:240px;
    object-fit:cover;
}

.day-image-caption{
    padding:12px;
    text-align:center;
    color:#555;
}

.button-row{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-top:30px;
}

.nav-button{
    display:inline-block;
    background:#3D95CE;
    color:white !important;
    text-decoration:none;
    padding:14px 22px;
    border-radius:10px;
    font-weight:bold;
}

.nav-button:hover{
    background:#2F7FB4;
}

@media(max-width:768px){

    .devotional-title{
        font-size:30px;
    }

    .devotional-hero img{
        height:220px;
    }

}

</style>
</head>

<body>

<div class="page">

<header class="header" role="banner">

<div class="title">
<h1>
<a href="index.html">
<img src="./Images/Logo400.jpg"
class="site-logo"
alt="Christian Steps Ministries"
width="400" />
</a>
</h1>
</div>

<div class="clear hideSkiplink">
<div id="siteHeader"></div>
</div>

</header>

<div class="main">

<main id="pageContent">

<div class="devotional-container">

<div class="devotional-hero">
    <img id="generalImage" src="" alt="Mission Image">
</div>

<div class="devotional-card">

    <h1 class="devotional-title" id="devotionalTitle"></h1>

    <div class="devotional-meta">

        <div id="devotionalDate"></div>

        <div id="devotionalLocation"></div>

        <div id="devotionalScripture"></div>

    </div>

    <div class="devotional-content" id="devotionalContent"></div>

    <div class="button-row">

        <a class="nav-button" id="previousDay">← Previous Day</a>

        <a class="nav-button" href="missionitinerary.html">
            Return to Calendar
        </a>

        <a class="nav-button" href="missions.html">
            Return to Mission Home
        </a>

        <a class="nav-button" id="nextDay">Next Day →</a>

    </div>

</div>

<div class="day-image-grid" id="dayImageGrid"></div>

</div>

</main>

</div>

</div>

<div id="siteFooter"></div>

<script>

function getQueryParam(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
}

const day = parseInt(getQueryParam('day')) || 1;

fetch('./data/missions.json')
.then(r => r.json())
.then(data => {

    const devotional = data.find(d => d.Date == day);

    if(!devotional) return;

    document.getElementById('devotionalTitle').innerText =
        devotional.Devotional.Title;

    document.getElementById('devotionalDate').innerHTML =
        `<strong>Day:</strong> June ${devotional.Date}`;

    document.getElementById('devotionalLocation').innerHTML =
        `<strong>Location:</strong> ${devotional.Location}`;

    document.getElementById('devotionalScripture').innerHTML =
        `<strong>Scripture:</strong>
         <a href="${devotional.ScriptureURL || devotional["Scripture URL"]}"
            target="_blank">
            ${devotional["Daily Scripture"]}
         </a>`;

    document.getElementById('devotionalContent').innerHTML =
        devotional.Devotional.Content;

    document.getElementById('generalImage').src =
        devotional.GeneralImage;

    const grid = document.getElementById('dayImageGrid');

    devotional.DayImages.forEach(img => {

        if(img.Enabled){

            const card = document.createElement('div');

            card.className = 'day-image-card';

            card.innerHTML = `
                <img src="${img.Image}" alt="">
                <div class="day-image-caption">
                    ${img.Caption || ""}
                </div>
            `;

            grid.appendChild(card);

        }

    });

    // Previous Day
    const prev = day - 1;

    if(prev >= 1){
        document.getElementById('previousDay').href =
            `devotional.html?day=${prev}`;
    } else {
        document.getElementById('previousDay').style.display = 'none';
    }

    // Next Day
    const next = day + 1;

    if(next <= data.length){
        document.getElementById('nextDay').href =
            `devotional.html?day=${next}`;
    } else {
        document.getElementById('nextDay').style.display = 'none';
    }

});

fetch('header.html')
.then(r => r.text())
.then(h => {
    document.getElementById('siteHeader').innerHTML = h;
});

fetch('footer.html')
.then(r => r.text())
.then(f => {
    document.getElementById('siteFooter').innerHTML = f;
});

</script>

</body>
</html>
