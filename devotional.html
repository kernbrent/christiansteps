<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mission Devotional</title>

<link href="Styles/Site.css" rel="stylesheet" />
<link href="Styles/Site_mobile.css" rel="stylesheet" />

<style>

.devotional-container{
    max-width:1100px;
    margin:0 auto;
}

.hero-image{
    width:100%;
    height:min(38vw,340px);

    object-fit:cover;
    object-position:center center;

    border-radius:16px;
    margin-bottom:25px;

    display:block;
}

.content-card{
    background:#fff;
    padding:30px;
    border-radius:16px;
    margin-bottom:25px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.section-title{
    color:#3D95CE;
    margin-bottom:12px;
}

.scripture-box{
    background:#f5f9fc;
    border-left:5px solid #3D95CE;
    padding:18px;
    border-radius:10px;
    margin:20px 0;
}

.reflection-list li{
    margin-bottom:12px;
    line-height:1.6;
}

.prayer-box{
    background:#f7f7f7;
    padding:20px;
    border-radius:12px;
    line-height:1.8;
}

.notes-box{
    width:100%;
    min-height:180px;
    margin-top:15px;
    padding:15px;
    border-radius:10px;
    border:1px solid #ccc;
}

.image-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:18px;
    margin-top:20px;
}

.image-grid img{
    width:100%;
    height:240px;
    object-fit:cover;
    border-radius:12px;
}

.button-row{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin-top:25px;
}

.nav-button{
    background:#3D95CE;
    color:#fff !important;
    text-decoration:none;
    padding:14px 22px;
    border-radius:10px;
    font-weight:bold;
}

@media(max-width:768px){
    .hero-image{
        height:220px;
    }
}

</style>
</head>
<body>
  <a class="skip-link" href="#pageContent">Skip to content</a>
  <div class="page">
    <header class="header" role="banner">
      <div class="title">
        <h1>
          <a href="index.html">
            <img src="./Images/Logo400.jpg"
                 class="site-logo" alt="Christian Steps Ministries"
                 width="400"
                  />
          </a>
        </h1>
      </div>
      <div class="clear hideSkiplink">
        <div id="siteHeader"></div>
      </div>
    </header>
    <div class="main">
      <main id="pageContent" role="main">

<div class="devotional-container">

<img id="generalImage" class="hero-image" src="">

<div class="content-card">

<h1 id="title"></h1>

<div class="scripture-box">
<strong>Scripture:</strong>
<a id="scriptureLink" target="_blank"></a>
</div>

<h2 class="section-title">Overview</h2>
<div id="overview"></div>

<h2 class="section-title">Reflection Questions</h2>
<ul class="reflection-list" id="questions"></ul>

<h2 class="section-title">Group Prayer</h2>
<div class="prayer-box" id="prayer"></div>

<h2 class="section-title">Prayer Notes</h2>
<textarea class="notes-box" placeholder="Write your reflections and prayer notes here..."></textarea>

<div class="button-row">
<a class="nav-button" id="prevBtn">← Previous Day</a>
<a class="nav-button" href="missionitinerary.html">Return to Calendar</a>
<a class="nav-button" href="missions.html">Mission Home</a>
<a class="nav-button" id="nextBtn">Next Day →</a>
</div>

</div>

<div class="image-grid" id="imageGrid"></div>

</div>

</main>
</div>
</div>

<div id="siteFooter"></div>

<script>

const params = new URLSearchParams(window.location.search);
const day = parseInt(params.get('day')) || 3;

fetch('./data/missions.json')
.then(r => r.json())
.then(data => {

    const item = data.find(x => x.Date == day);

    document.getElementById('title').innerText =
        item.Devotional.Title;

    document.getElementById('overview').innerHTML =
        '<p>' + item.Devotional.Overview.replace(/\n/g,'</p><p>') + '</p>';

    document.getElementById('scriptureLink').innerText =
        item["Daily Scripture"];

    document.getElementById('scriptureLink').href =
        item["Scripture URL"];

    const q = document.getElementById('questions');

    item.Devotional.ReflectionQuestions.forEach(question => {

        const li = document.createElement('li');
        li.innerText = question;
        q.appendChild(li);

    });

    document.getElementById('prayer').innerHTML =
        '<p>' + item.Devotional.GroupPrayer.replace(/\n/g,'</p><p>') + '</p>';

    document.getElementById('generalImage').src =
        item.GeneralImage;

    const grid = document.getElementById('imageGrid');

    item.DayImages.forEach(img => {

        if(img.Enabled){

            const div = document.createElement('div');

            div.innerHTML =
                `<img src="${img.Image}" alt="">`;

            grid.appendChild(div);

        }

    });

    if(day > 1){
        document.getElementById('prevBtn').href =
            `devotional.html?day=${day-1}`;
    } else {
        document.getElementById('prevBtn').style.display = 'none';
    }

    if(day < 20){
        document.getElementById('nextBtn').href =
            `devotional.html?day=${day+1}`;
    } else {
        document.getElementById('nextBtn').style.display = 'none';
    }

});

fetch('header.html')
.then(r => r.text())
.then(h => {
    document.getElementById('siteHeader').innerHTML = h;
});

fetch('footer.html')
.then(r => r.text())
.then(f => {
    document.getElementById('siteFooter').innerHTML = f;
});

</script>

</body>
</html>
