<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mission Itinerary - Christian Steps Ministries</title>

<link href="Styles/Site.css" rel="stylesheet" />
<link href="Styles/Site_mobile.css" rel="stylesheet" />
<link href="Styles/mission_itinerary_calendar_styles.css" rel="stylesheet" />

</head>

<body>

<a class="skip-link" href="#pageContent">Skip to content</a>

<div class="page">

<header class="header" role="banner">

<div class="title">
<h1>
<a href="index.html">
<img src="./Images/Logo400.jpg"
class="site-logo"
alt="Christian Steps Ministries"
width="400" />
</a>
</h1>
</div>

<div class="clear hideSkiplink">
<div id="siteHeader"></div>
</div>

</header>

<div class="main">

<main id="pageContent" role="main">

<section class="home-hero">

<h2>Mission Trip Itinerary</h2>

<p><strong>June 1–20, 2026</strong></p>

<div class="card">
<p>
Daily locations, activities, and scripture focus for the mission trip.
</p>
</div>

</section>

<section class="home-section">

<div class="itinerary-wrapper">

<div class="itinerary-grid" id="calendarGrid">

<div class="calendar-header">Sunday</div>
<div class="calendar-header">Monday</div>
<div class="calendar-header">Tuesday</div>
<div class="calendar-header">Wednesday</div>
<div class="calendar-header">Thursday</div>
<div class="calendar-header">Friday</div>
<div class="calendar-header">Saturday</div>

</div>

</div>

</section>

</main>
</div>
</div>

<div id="siteFooter"></div>

<script>

fetch('header.html')
.then(r => r.text())
.then(h => {
    document.getElementById('siteHeader').innerHTML = h;
});

fetch('footer.html')
.then(r => r.text())
.then(f => {
    document.getElementById('siteFooter').innerHTML = f;
});

Promise.all([
    fetch('./data/missions.json').then(r => r.json()),
    fetch('./data/dayactivities.json').then(r => r.json())
])
.then(([missions, activities]) => {

    missions.sort((a, b) => a.Date - b.Date);

    const calendarGrid =
        document.getElementById('calendarGrid');

    const visibleDays =
        missions.filter(d => d.ShowOnCalendar !== false);

    const firstDate =
        visibleDays.length > 0 ? visibleDays[0].Date : 1;

    const blankDays =
        (firstDate - 1) % 7;

    for(let i = 0; i < blankDays; i++){

        const blank =
            document.createElement('div');

        blank.className =
            'calendar-day blank-day';

        calendarGrid.appendChild(blank);
    }

    visibleDays.forEach(day => {

        const dayCard =
            document.createElement('div');

        dayCard.className =
            'calendar-day';

        if(day.IsMissionDay === false){

            dayCard.classList.add(
                'non-mission-day'
            );
        }

        const activityDay =
            activities.find(a =>
                a.Date === day.Date &&
                a.Published !== false
            );

        const updateButton =
            activityDay
            ? `<a class="calendar-mini-btn"
                   href="dayactivities.html?day=${day.Date}">
                   Updates
               </a>`
            : `<span class="calendar-mini-btn disabled">
                   Updates
               </span>`;

        const devotionalButton =
            day.IsMissionDay === false
            ? `<span class="calendar-mini-btn disabled">
                   Devotional
               </span>`
            : `<a class="calendar-mini-btn"
                   href="devotional.html?day=${day.Date}">
                   Devotional
               </a>`;

        dayCard.innerHTML = `

            <div class="day-number">
                ${day.Date}
            </div>

            <div class="calendar-location">
                ${day.Location || ''}
            </div>

            <div class="calendar-activities">
                ${day["Days Activities"] || ''}
            </div>

            <div class="calendar-scripture-ref">
                ${day["Daily Scripture"] || ''}
            </div>

            <div class="calendar-scripture-summary">
                ${day["Daily Scripture Summary"] || ''}
            </div>

            <div class="calendar-button-row">
                ${devotionalButton}
                ${updateButton}
            </div>

        `;

        calendarGrid.appendChild(dayCard);

    });

})
.catch(err => {

    console.error(
        'Calendar load error:',
        err
    );

});

</script>

</body>
</html>
