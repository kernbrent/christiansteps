<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ChristianSteps Journey Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.topbar{
background:#3a4f63;
color:white;
padding:15px;
}

.controls{
background:white;
padding:15px;
display:flex;
flex-wrap:wrap;
gap:20px;
border-bottom:1px solid #ddd;
}

.mode-btn{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
background:#ddd;
}

.mode-btn.active{
background:#3D95CE;
color:white;
}

#map{
height:72vh;
}

.timeline{
background:white;
padding:15px;
border-top:1px solid #ddd;
display:flex;
align-items:center;
gap:10px;
overflow-x:auto;
}

.timeline-item{
padding:8px 10px;
border-radius:8px;
background:#eee;
cursor:pointer;
white-space:nowrap;
}

.timeline-item.active{
background:#3D95CE;
color:white;
}

.side-panel{
position:absolute;
top:150px;
right:15px;
z-index:999;
width:320px;
max-height:70vh;
overflow:auto;
background:white;
padding:15px;
border-radius:14px;
box-shadow:0 4px 18px rgba(0,0,0,.25);
display:none;
}

.side-panel.active{
display:block;
}

.current-marker{
background:#ff5722;
width:24px;
height:24px;
border-radius:50%;
border:4px solid white;
box-shadow:0 0 18px rgba(255,87,34,.8);
animation:pulse 1.5s infinite;
}

.standard-marker{
background:#3D95CE;
width:14px;
height:14px;
border-radius:50%;
border:2px solid white;
}

.journey-marker{
background:#28a745;
width:18px;
height:18px;
border-radius:50%;
border:3px solid white;
box-shadow:0 0 12px rgba(40,167,69,.7);
}

.dashboard-marker{
background:#6f42c1;
width:18px;
height:18px;
border-radius:4px;
border:2px solid white;
}

.photo-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
margin-top:12px;
}

.photo-grid img{
width:100%;
border-radius:10px;
}

.stats{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:10px;
}

.stat-card{
background:#f2f2f2;
padding:10px;
border-radius:10px;
font-size:14px;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

</style>
</head>

<body>

<div class="topbar">
<h2>Europe + Mission Journey</h2>
</div>

<div class="controls">

<div>
<strong>Travelers:</strong><br>
<label><input type="checkbox" value="Brent" checked> Brent</label>
<label><input type="checkbox" value="Corrie" checked> Corrie</label>
<label><input type="checkbox" value="Lily" checked> Lily</label>
<label><input type="checkbox" value="Ethan" checked> Ethan</label>
<label><input type="checkbox" value="Bill" checked> Bill</label>
</div>

<div>
<strong>Modes:</strong><br>
<button class="mode-btn active" data-mode="minimal">Minimal</button>
<button class="mode-btn" data-mode="journey">Journey</button>
<button class="mode-btn" data-mode="dashboard">Mission Dashboard</button>
</div>

<div>
<strong>Replay:</strong><br>
<button id="playBtn">▶ Replay Journey</button>
</div>

</div>

<div id="sidePanel" class="side-panel"></div>

<div id="map"></div>

<div id="timeline" class="timeline"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([45,12],5);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ attribution:'© OpenStreetMap' }
).addTo(map);

let currentMode = 'minimal';
let selectedDate = null;
let routeLayer = null;
let markerLayer = null;

fetch('./data/tripmap.json')
.then(r => r.json())
.then(data => {

window.tripData = data;

selectedDate = data[0].Date;

buildTimeline(data);

renderMap();

document.querySelectorAll('input[type=checkbox]')
.forEach(cb => cb.addEventListener('change', renderMap));

document.querySelectorAll('.mode-btn')
.forEach(btn => {

btn.addEventListener('click', () => {

document.querySelectorAll('.mode-btn')
.forEach(b => b.classList.remove('active'));

btn.classList.add('active');

currentMode = btn.dataset.mode;

renderMap();

});

});

document.getElementById('playBtn')
.addEventListener('click', replayJourney);

});

function buildTimeline(data){

const timeline = document.getElementById('timeline');

timeline.innerHTML = '';

data.forEach(day => {

const div = document.createElement('div');

div.className = 'timeline-item';

if(day.Date === selectedDate){
div.classList.add('active');
}

div.innerText = day.Date + ' - ' + day.City;

div.onclick = () => {

selectedDate = day.Date;

buildTimeline(data);

renderMap();

};

timeline.appendChild(div);

});

}

function replayJourney(){

let i = 0;

const interval = setInterval(() => {

if(i >= tripData.length){

clearInterval(interval);
return;

}

selectedDate = tripData[i].Date;

buildTimeline(tripData);

renderMap();

i++;

}, 1600);

}

function renderMap(){

if(routeLayer){
map.removeLayer(routeLayer);
}

if(markerLayer){
map.removeLayer(markerLayer);
}

markerLayer = L.layerGroup().addTo(map);

const selectedTravelers =
Array.from(document.querySelectorAll('input[type=checkbox]:checked'))
.map(cb => cb.value);

const filtered =
tripData.filter(day =>
day.Travelers.some(t =>
selectedTravelers.includes(t)
)
);

const coords = [];

filtered.forEach(day => {

coords.push([day.Latitude, day.Longitude]);

const isCurrent =
day.Date === selectedDate;

let markerClass = 'standard-marker';

if(isCurrent){
markerClass = 'current-marker';
}
else if(currentMode === 'journey'){
markerClass = 'journey-marker';
}
else if(currentMode === 'dashboard'){
markerClass = 'dashboard-marker';
}

const icon = L.divIcon({
className:'',
html:`<div class="${markerClass}"></div>`,
iconSize:[22,22]
});

const marker = L.marker(
[day.Latitude, day.Longitude],
{ icon }
);

const popup = `
<strong>${day.Title}</strong><br>
${day.City}, ${day.Country}<br><br>

${day.Transportation.Icon}
${day.Transportation.Description}<br><br>

<strong>Travelers:</strong><br>
${day.Travelers.join(', ')}
`;

marker.bindPopup(popup);

marker.addTo(markerLayer);

if(isCurrent){
marker.openPopup();
renderPanel(day);
}

});

routeLayer = L.polyline(coords, {
color:
currentMode === 'journey'
? '#28a745'
: currentMode === 'dashboard'
? '#6f42c1'
: '#3D95CE',
weight:
currentMode === 'journey'
? 6
: 4,
opacity:.85
}).addTo(map);

map.fitBounds(routeLayer.getBounds(), {
padding:[40,40]
});

}

function renderPanel(day){

const panel =
document.getElementById('sidePanel');

panel.classList.add('active');

let html = `

<h2>${day.Title}</h2>

<p>
<strong>${day.City}, ${day.Country}</strong>
</p>

<p>
${day.Transportation.Icon}
${day.Transportation.Description}
</p>

<div class="stats">

<div class="stat-card">
Mission Day:
${day.MissionDay ? 'Yes' : 'No'}
</div>

<div class="stat-card">
Travelers:
${day.Travelers.length}
</div>

</div>

`;

if(currentMode === 'journey'){

html += `
<hr>

<h3>Journey Mode</h3>

<p>
Interactive storytelling mode with route progression,
travel visualization, and optional photos.
</p>
`;

}

if(currentMode === 'dashboard'){

html += `
<hr>

<h3>Mission Dashboard</h3>

<p>
<a href="devotional.html">View Devotional</a>
</p>

<p>
<a href="dayactivities.html">View Updates</a>
</p>
`;

}

if(day.Photos.length > 0){

html += '<div class="photo-grid">';

day.Photos.forEach(photo => {

html += `
<img src="${photo.Image}" alt="Trip Photo">
`;

});

html += '</div>';

}
else{

html += `
<hr>

<h3>Optional Photos</h3>

<p>
No photos uploaded for this day yet.
</p>
`;

}

panel.innerHTML = html;

}

</script>

</body>
</html>
