<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Europe + Mission Trip Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
.topbar{background:#3a4f63;color:white;padding:14px 18px;}
.controls{background:white;padding:14px;display:flex;flex-wrap:wrap;gap:20px;border-bottom:1px solid #ddd;}
.control-group{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.mode-btn{padding:8px 12px;border:none;border-radius:8px;cursor:pointer;background:#ddd;font-weight:bold;}
.mode-btn.active{background:#3D95CE;color:white;}
#map{height:80vh;width:100%;}

.current-marker{
background:#ff5722;
width:22px;
height:22px;
border-radius:50%;
border:4px solid white;
box-shadow:0 0 18px rgba(255,87,34,.85);
animation:pulse 1.5s infinite;
}

.standard-marker{
background:#3D95CE;
width:14px;
height:14px;
border-radius:50%;
border:2px solid white;
}

.adventure-marker{
background:#28a745;
width:18px;
height:18px;
border-radius:50%;
border:3px solid white;
box-shadow:0 0 15px rgba(40,167,69,.8);
}

.dashboard-marker{
background:#6f42c1;
width:16px;
height:16px;
border-radius:4px;
border:2px solid white;
}

.dashboard-panel{
position:absolute;
top:145px;
right:15px;
z-index:999;
background:white;
padding:14px;
border-radius:12px;
box-shadow:0 4px 14px rgba(0,0,0,.2);
width:260px;
max-height:70vh;
overflow:auto;
display:none;
}

.dashboard-panel.active{
display:block;
}

.dashboard-card{
padding:10px;
border-bottom:1px solid #ddd;
margin-bottom:10px;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}
</style>
</head>
<body>

<div class="topbar">
<h2>Europe + Mission Journey Map</h2>
</div>

<div class="controls">

<div class="control-group">
<strong>Travelers:</strong>
<label><input type="checkbox" value="Brent" checked> Brent</label>
<label><input type="checkbox" value="Corrie" checked> Corrie</label>
<label><input type="checkbox" value="Ethan" checked> Ethan</label>
<label><input type="checkbox" value="Bill" checked> Bill</label>
<label><input type="checkbox" value="Lily" checked> Lily</label>
</div>

<div class="control-group">
<strong>View Mode:</strong>
<button class="mode-btn active">Minimal</button>
<button class="mode-btn">Adventure</button>
<button class="mode-btn">Mission Dashboard</button>
</div>

</div>

<div id="dashboardPanel" class="dashboard-panel"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const CURRENT_DATE = "2026-06-03";

const map = L.map('map').setView([45,12],5);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ attribution:'© OpenStreetMap' }
).addTo(map);

let routeLayer = null;
let markerLayer = null;
let currentMode = 'minimal';

fetch('./data/tripmap.json')
.then(r => r.json())
.then(data => {

window.tripData = data;

renderMap();

document.querySelectorAll('input[type=checkbox]')
.forEach(cb => {
cb.addEventListener('change', renderMap);
});

document.querySelectorAll('.mode-btn')
.forEach(btn => {

btn.addEventListener('click', () => {

document.querySelectorAll('.mode-btn')
.forEach(b => b.classList.remove('active'));

btn.classList.add('active');

currentMode =
btn.innerText.toLowerCase().replace(' ','-');

renderMap();

});

});

});

function renderMap(){

if(routeLayer){
map.removeLayer(routeLayer);
}

if(markerLayer){
map.removeLayer(markerLayer);
}

markerLayer = L.layerGroup().addTo(map);

const selected =
Array.from(document.querySelectorAll('input[type=checkbox]:checked'))
.map(cb => cb.value);

const filtered =
tripData.filter(day =>
day.Travelers.some(t =>
selected.includes(t)
)
);

const coords = [];

filtered.forEach(day => {

coords.push([day.Latitude, day.Longitude]);

const current =
day.Date === CURRENT_DATE;

let markerClass = 'standard-marker';

if(current){
markerClass = 'current-marker';
}
else if(currentMode === 'adventure'){
markerClass = 'adventure-marker';
}
else if(currentMode === 'mission-dashboard'){
markerClass = 'dashboard-marker';
}

const icon = L.divIcon({
className:'',
html:`<div class="${markerClass}"></div>`,
iconSize:[22,22]
});

const marker = L.marker(
[day.Latitude, day.Longitude],
{ icon }
);

marker.bindPopup(`
<strong>${day.Title}</strong><br>
${day.City}, ${day.Country}<br><br>
<strong>Date:</strong> ${day.Date}<br>
<strong>Travelers:</strong><br>
${day.Travelers.join(', ')}
`);

marker.addTo(markerLayer);

if(current){
marker.openPopup();
}

});

routeLayer = L.polyline(
coords,
{
color:'#3D95CE',
weight:4,
opacity:.8
}
).addTo(map);

map.fitBounds(routeLayer.getBounds(), {
padding:[50,50]
});

renderDashboard(filtered);

}

function renderDashboard(days){

const panel =
document.getElementById('dashboardPanel');

if(currentMode !== 'mission-dashboard'){

panel.classList.remove('active');
panel.innerHTML = '';
return;

}

panel.classList.add('active');

panel.innerHTML = `
<h3>Mission Dashboard</h3>
`;

days.forEach(day => {

panel.innerHTML += `

<div class="dashboard-card">

<strong>${day.Title}</strong><br>
${day.City}, ${day.Country}<br><br>

<strong>Date:</strong><br>
${day.Date}<br><br>

<strong>Travelers:</strong><br>
${day.Travelers.join(', ')}

</div>

`;

});

}

</script>

</body>
</html>
