<!doctype html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Europe + Mission Journey | ChristianSteps</title>

    <link href="Styles/Site.css" rel="stylesheet">
    <link href="Styles/Site_mobile.css" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            background: #f5f5f5;
        }

        .main-content-wrapper {
            padding: 20px;
        }

        .controls {
            background: white;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            border-radius: 14px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
        }

        .mode-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            background: #ddd;
        }

        .mode-btn.active {
            background: #3D95CE;
            color: white;
        }

        #map {
            height: 72vh;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 18px rgba(0, 0, 0, .15);
        }

        .timeline {
            background: white;
            padding: 15px;
            border-radius: 14px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
        }

        .timeline-item {
            padding: 8px 10px;
            border-radius: 8px;
            background: #eee;
            cursor: pointer;
            white-space: nowrap;
        }

        .timeline-item.active {
            background: #3D95CE;
            color: white;
        }

        .side-panel {
            position: absolute;
            top: 240px;
            right: 30px;
            z-index: 999;
            width: 320px;
            max-height: 65vh;
            overflow: auto;
            background: white;
            padding: 15px;
            border-radius: 14px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, .25);
            display: none;
        }

        .side-panel.active {
            display: block;
        }

        .current-marker {
            background: #ff5722;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 0 18px rgba(255, 87, 34, .8);
            animation: pulse 1.5s infinite;
        }

        .standard-marker {
            background: #3D95CE;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .journey-marker {
            background: #28a745;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 3px solid white;
        }

        .dashboard-marker {
            background: #6f42c1;
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 2px solid white;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .photo-grid img {
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            transition: transform .2s ease;
        }

        .photo-grid img:hover {
            transform: scale(1.03);
        }

        .stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .stat-card {
            background: #f2f2f2;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
        }

        .lightbox-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5000;
            flex-direction: column;
            padding: 20px;
        }

        .lightbox-overlay.active {
            display: flex;
        }

        .lightbox-image {
            max-width: 90vw;
            max-height: 78vh;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, .5);
        }

        .lightbox-controls {
            margin-top: 18px;
            display: flex;
            gap: 12px;
        }

        .lightbox-btn {
            background: #3D95CE;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .lightbox-close {
            position: absolute;
            top: 18px;
            right: 24px;
            color: white;
            font-size: 34px;
            cursor: pointer;
            font-weight: bold;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>

</head>

<body>

    <div class="page">

        <header class="header" role="banner">

            <div class="title">
                <h1>
                    <a href="index.html">
                        <img src="./Images/Logo400.jpg" class="site-logo" alt="Christian Steps Ministries"
                            width="400" />
                    </a>
                </h1>
            </div>

            <div class="clear hideSkiplink">
                <div id="siteHeader"></div>
            </div>

        </header>

        <div class="main">

            <main id="pageContent" role="main">

                <div class="main-content-wrapper">

                    <section class="home-hero">

                        <h2>Europe + Mission Journey</h2>

                        <p>
                            Interactive travel map, mission dashboard,
                            timeline, photos, and traveler journey experience.
                        </p>

                    </section>

                    <div class="controls">

                        <div>
                            <strong>Travelers:</strong><br>

                            <label><input type="checkbox" value="Brent" checked> Brent</label>
                            <label><input type="checkbox" value="Corrie" checked> Corrie</label>
                            <label><input type="checkbox" value="Lily" checked> Lily</label>
                            <label><input type="checkbox" value="Ethan" checked> Ethan</label>
                            <label><input type="checkbox" value="Bill" checked> Bill</label>

                        </div>

                        <div>

                            <strong>Modes:</strong><br>

                            <button class="mode-btn active" data-mode="minimal">
                                Minimal
                            </button>

                            <button class="mode-btn" data-mode="journey">
                                Journey
                            </button>

                            <button class="mode-btn" data-mode="dashboard">
                                Mission Dashboard
                            </button>

                        </div>

                        <div>

                            <strong>Replay:</strong><br>

                            <button id="playBtn">
                                ▶ Replay Journey
                            </button>

                        </div>
                        <div>

                            <strong>Gallery:</strong><br>

                            <a href="tripgallery.html" class="gallery-btn">
                                📸 Photo Gallery
                            </a>

                        </div>

                    </div>

                    <div id="sidePanel" class="side-panel"></div>

                    <div id="timeline" class="timeline"></div>

                    <div id="map"></div>



                </div>

            </main>

        </div>

    </div>

    <!-- LIGHTBOX -->

    <div id="lightboxOverlay" class="lightbox-overlay">

        <div class="lightbox-close" onclick="closeLightbox()">
            ×
        </div>

        <img id="lightboxImage" class="lightbox-image" src="" alt="">

        <div class="lightbox-controls">

            <button class="lightbox-btn" onclick="prevImage()">
                ◀ Previous
            </button>

            <button class="lightbox-btn" onclick="nextImage()">
                Next ▶
            </button>

        </div>

    </div>

    <div id="siteFooter"></div>

    <!-- LEAFLET -->

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- MAIN SCRIPT -->

    <script>

        fetch('header.html')
            .then(r => r.text())
            .then(h => {
                document.getElementById('siteHeader').innerHTML = h;
            });

        fetch('footer.html')
            .then(r => r.text())
            .then(f => {
                document.getElementById('siteFooter').innerHTML = f;
            });

        const map = L.map('map').setView([45, 12], 5);

        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution: '© OpenStreetMap'
            }
        ).addTo(map);

        let currentMode = 'minimal';
        let selectedDate = null;
        let routeLayer = null;
        let markerLayer = null;

        let currentLightboxIndex = 0;
        let currentLightboxPhotos = [];

        fetch('./data/tripmap.json')
            .then(r => r.json())
            .then(data => {

                window.tripData = data;

                // DEFAULT TO JOURNEY MODE
                currentMode = 'journey';

                // activate Journey button visually
                document.querySelectorAll('.mode-btn')
                    .forEach(b => b.classList.remove('active'));

                document.querySelector('[data-mode="journey"]')
                    .classList.add('active');

                // DETERMINE DEFAULT DATE
                const today = new Date();

                // subtract one day
                today.setDate(today.getDate() - 1);

                // convert to yyyy-mm-dd
                const systemDate =
                    today.toISOString().split('T')[0];

                // get all trip dates
                const tripDates =
                    data.map(d => d.Date).sort();

                // default to last trip day
                selectedDate = tripDates[tripDates.length - 1];

                // if system date exists in trip range,
                // use that instead
                const matchingDate =
                    tripDates.find(d => d === systemDate);

                if (matchingDate) {
                    selectedDate = matchingDate;
                }
                else {

                    // if system date BEFORE trip starts
                    // use first trip day
                    if (systemDate < tripDates[0]) {
                        selectedDate = tripDates[0];
                    }

                    // if AFTER trip ends,
                    // keep last trip day
                }

                buildTimeline(data);

                renderMap();

                document.querySelectorAll('input[type=checkbox]')
                    .forEach(cb => {
                        cb.addEventListener('change', renderMap);
                    });

                document.querySelectorAll('.mode-btn')
                    .forEach(btn => {

                        btn.addEventListener('click', () => {

                            document.querySelectorAll('.mode-btn')
                                .forEach(b => b.classList.remove('active'));

                            btn.classList.add('active');

                            currentMode = btn.dataset.mode;

                            renderMap();

                        });

                    });

                document
                    .getElementById('playBtn')
                    .addEventListener('click', replayJourney);

            })
            .catch(error => {
                console.error('JSON LOAD ERROR:', error);
            });

        function buildTimeline(data) {

            const timeline =
                document.getElementById('timeline');

            timeline.innerHTML = '';

            data.forEach(day => {

                const div =
                    document.createElement('div');

                div.className = 'timeline-item';

                if (day.Date === selectedDate) {
                    div.classList.add('active');
                }

                div.innerText =
                    day.Date + ' - ' + day.City;

                div.onclick = () => {

                    selectedDate = day.Date;

                    buildTimeline(data);

                    renderMap();

                };

                timeline.appendChild(div);

            });

        }

        function replayJourney() {

            let i = 0;

            const interval = setInterval(() => {

                if (i >= tripData.length) {

                    clearInterval(interval);
                    return;

                }

                selectedDate = tripData[i].Date;

                buildTimeline(tripData);

                renderMap();

                i++;

            }, 1800);

        }

        function renderMap() {

            if (routeLayer) {
                map.removeLayer(routeLayer);
            }

            if (markerLayer) {
                map.removeLayer(markerLayer);
            }

            markerLayer = L.layerGroup().addTo(map);

            const selectedTravelers =
                Array.from(
                    document.querySelectorAll(
                        'input[type=checkbox]:checked'
                    )
                ).map(cb => cb.value);

            const filtered =
                tripData.filter(day =>
                    day.Travelers.some(t =>
                        selectedTravelers.includes(t)
                    )
                );

            const coords = [];

            filtered.forEach(day => {

                coords.push([
                    day.Latitude,
                    day.Longitude
                ]);

                const isCurrent =
                    day.Date === selectedDate;

                let markerClass = 'standard-marker';

                if (isCurrent) {
                    markerClass = 'current-marker';
                }
                else if (currentMode === 'journey') {
                    markerClass = 'journey-marker';
                }
                else if (currentMode === 'dashboard') {
                    markerClass = 'dashboard-marker';
                }

                const icon = L.divIcon({
                    className: '',
                    html: `<div class="${markerClass}"></div>`,
                    iconSize: [22, 22]
                });

                const marker = L.marker(
                    [day.Latitude, day.Longitude],
                    { icon }
                );

                marker.bindPopup(`
            <strong>${day.Title}</strong><br>
            ${day.City}, ${day.Country}
        `);

                marker.addTo(markerLayer);

                if (isCurrent) {
                    marker.openPopup();
                    renderPanel(day);
                }

            });

            routeLayer = L.polyline(coords, {

                color:
                    currentMode === 'journey'
                        ? '#28a745'
                        : currentMode === 'dashboard'
                            ? '#6f42c1'
                            : '#3D95CE',

                weight:
                    currentMode === 'journey'
                        ? 6
                        : 4,

                opacity: .85

            }).addTo(map);

            map.fitBounds(
                routeLayer.getBounds(),
                {
                    padding: [40, 40]
                }
            );

        }

        function renderPanel(day) {

            const panel =
                document.getElementById('sidePanel');

            panel.classList.add('active');

            let html = `

    <h2>${day.Title}</h2>

    <p>
    <strong>${day.City}, ${day.Country}</strong>
    </p>

    <p>
    ${day.Transportation.Icon}
    ${day.Transportation.Description}
    </p>

    <div class="stats">

        <div class="stat-card">
        Mission Day:
        ${day.MissionDay ? 'Yes' : 'No'}
        </div>

        <div class="stat-card">
        Travelers:
        ${day.Travelers.length}
        </div>

    </div>

    `;

            if (currentMode === 'journey') {

                html += `
        <hr>

        <h3>Journey Mode</h3>

        <p>
        Interactive storytelling mode with
        route progression and travel visualization.
        </p>
        `;

            }

            if (currentMode === 'dashboard') {

                html += `

        <hr>

        <h3>Mission Dashboard</h3>

        ${day.MissionDay
                        ? `
        <p>
        <a href="devotional.html?day=${day.Date}">
            View Devotional
        </a>
        </p>
        `
                        : ''}

        <p>
        <a href="dayactivities.html?day=${day.Date}">
            View Updates
        </a>
        </p>

        `;

            }

            if (day.Photos && day.Photos.length > 0) {

                html += '<div class="photo-grid">';

                day.Photos.forEach((photo, index) => {

                    html += `
            <img
                src="${photo.Image}"
                alt="Trip Photo"
                onclick="openLightbox(${index})"
            >
            `;

                });

                html += '</div>';

                currentLightboxPhotos = day.Photos;

            }
            else {

                html += `

        <hr>

        <h3>Optional Photos</h3>

        <p>
        No photos uploaded for this day yet.
        </p>

        `;

            }

            panel.innerHTML = html;

        }

        function openLightbox(index) {

            currentLightboxIndex = index;

            document
                .getElementById('lightboxOverlay')
                .classList.add('active');

            updateLightboxImage();

        }

        function closeLightbox() {

            document
                .getElementById('lightboxOverlay')
                .classList.remove('active');

        }

        function updateLightboxImage() {

            const image =
                document.getElementById('lightboxImage');

            image.src =
                currentLightboxPhotos[
                    currentLightboxIndex
                ].Image;

        }

        function prevImage() {

            currentLightboxIndex--;

            if (currentLightboxIndex < 0) {
                currentLightboxIndex =
                    currentLightboxPhotos.length - 1;
            }

            updateLightboxImage();

        }

        function nextImage() {

            currentLightboxIndex++;

            if (currentLightboxIndex >= currentLightboxPhotos.length) {
                currentLightboxIndex = 0;
            }

            updateLightboxImage();

        }

        document.addEventListener('keydown', e => {

            const overlay =
                document.getElementById('lightboxOverlay');

            if (!overlay.classList.contains('active')) {
                return;
            }

            if (e.key === 'Escape') {
                closeLightbox();
            }

            if (e.key === 'ArrowLeft') {
                prevImage();
            }

            if (e.key === 'ArrowRight') {
                nextImage();
            }

        });

    </script>

</body>

</html>
