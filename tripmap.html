    <style id="v64-mobile-fix">

                overflow-y: hidden !important;
                height: auto !important;

            }

            }

            #mobileSheet.sheet-full {

        @media (max-width:640px) {
            #timeline {
                display: flex !important;
                position: fixed !important;
                left: 0 !important;
                right: 0 !important;
                bottom: 72px !important;
                z-index: 9998 !important;
                overflow-x: auto !important;
                overflow-y: hidden !important;
                white-space: nowrap !important;

    <style id="v84-timeline-visible">
        @media (max-width:640px) {
            #timeline {
                position: fixed !important;

                bottom: 20px !important;
                /* above day card */
                z-index: 10001 !important;
                display: flex !important;
                flex-direction: row !important;
                overflow-x: auto !important;
                overflow-y: hidden !important;
                white-space: nowrap !important;
                background: rgba(255, 255, 255, .96) !important;

</head>

<body>

    <div class="page">

        <header class="header" role="banner">

            <div class="title">
                <h1>
                    <a href="index.html">
                        <img src="./Images/Logo400.jpg" class="site-logo" alt="Christian Steps Ministries"
                            width="400" />
                    </a>
                </h1>
            </div>

            <div class="clear hideSkiplink">
                <div id="siteHeader"></div>

        </header>

        <div class="main">

            <main id="pageContent" role="main">

                <div class="main-content-wrapper">

                    <section class="home-hero">

                        <h2>Europe Family Trip + Mission Journey</h2>

                            Interactive travel map,
                            timeline, photos, and traveler journey experience.
                        </p>

                    </section>

                    <div class="controls">

                        <div>
                            <strong>Travelers:</strong><br>

                            <label><input type="checkbox" value="Brent" checked> Brent</label>
                            <label><input type="checkbox" value="Corrie" checked> Corrie</label>
                            <label><input type="checkbox" value="Lily" checked> Lily</label>
                            <label><input type="checkbox" value="Ethan" checked> Ethan</label>
                            <label><input type="checkbox" value="Bill" checked> Bill</label>

                        </div>

                            <strong>Modes:</strong><br>

                                ▶ Replay Journey
                            </button>

                    <div id="mobileSheet" class="mobile-sheet sheet-collapsed">
                        <div class="mobile-sheet-handle"></div>

                            <button class="mobile-tab active" data-tab="overview">Overview</button>
                            <button class="mobile-tab" data-tab="photos">Photos</button>

    </div>

    <!-- LIGHTBOX -->

    <div id="lightboxOverlay" class="lightbox-overlay">

        <div class="lightbox-close" onclick="closeLightbox()">
            ×
        </div>

        <img id="lightboxImage" class="lightbox-image" src="" alt="">

        <div class="lightbox-controls">

            <button class="lightbox-btn" onclick="prevImage()">
                ◀ Previous
            </button>

            <button class="lightbox-btn" onclick="nextImage()">
                Next ▶
            </button>

        </div>

    </div>


    <!-- VIDEO POPUP -->

    <div id="videoOverlay" class="lightbox-overlay">

        <div class="lightbox-close" onclick="closeVideoPopup()">
            ×
        </div>

        <video id="popupVideo" controls autoplay class="lightbox-image" style="max-width:90%; max-height:90%;">

            <source id="popupVideoSource" src="" type="video/mp4">

        </video>

    </div>


    <div id="siteFooter"></div>

    <!-- LEAFLET -->

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
        /* MOBILE APP UX */
        if (window.innerWidth <= 640) {
            document.addEventListener('click', function (e) {
                if (e.target.id === 'mobileControlsBtn') {
                    const controls = document.querySelector('.controls');
                    controls.classList.toggle('mobile-controls-open');
                }
            });
        }

    </script>

    <!-- MAIN SCRIPT -->

    <script>

        fetch('header.html')
            .then(r => r.text())
            .then(h => {
                document.getElementById('siteHeader').innerHTML = h;
            });

        fetch('footer.html')
            .then(r => r.text())
            .then(f => {
                document.getElementById('siteFooter').innerHTML = f;
            });

        const map = L.map('map').setView([45, 12], 5);

        window.addEventListener('resize', () => {
            map.invalidateSize();
        });

        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution: '© OpenStreetMap'
            }
        ).addTo(map);

        let currentMode = 'minimal';
        let selectedDate = null;
        let routeLayer = null;
        let markerLayer = null;

        let currentLightboxIndex = 0;
        let currentLightboxPhotos = [];

        fetch('./data/tripmap.json')
            .then(r => r.json())
            .then(data => {

                window.tripData = data;

                // DEFAULT TO JOURNEY MODE
                currentMode = 'journey';

                // activate Journey button visually
                document.querySelectorAll('.mode-btn')
                    .forEach(b => b.classList.remove('active'));

                document.querySelector('[data-mode="journey"]')
                    .classList.add('active');

                // DETERMINE DEFAULT DATE
                const today = new Date();

                // subtract one day
                today.setDate(today.getDate() - 1);

                // convert to yyyy-mm-dd
                const systemDate =
                    today.toISOString().split('T')[0];

                // get all trip dates
                const tripDates =
                    data.map(d => d.Date).sort();

                // default to last trip day
                selectedDate = tripDates[tripDates.length - 1];

                // if system date exists in trip range,
                // use that instead
                const matchingDate =
                    tripDates.find(d => d === systemDate);

                if (matchingDate) {
                    selectedDate = matchingDate;
                }
                else {

                    // if system date BEFORE trip starts
                    // use first trip day
                    if (systemDate < tripDates[0]) {
                        selectedDate = tripDates[0];
                    }

                    // if AFTER trip ends,
                    // keep last trip day
                }

                buildTimeline(data);

                renderMap();

                document.querySelectorAll('input[type=checkbox]')
                    .forEach(cb => {
                        cb.addEventListener('change', renderMap);
                    });

                document.querySelectorAll('.mode-btn')
                    .forEach(btn => {

                        btn.addEventListener('click', () => {

                            document.querySelectorAll('.mode-btn')
                                .forEach(b => b.classList.remove('active'));

                            btn.classList.add('active');

                            currentMode = btn.dataset.mode;

                            renderMap();

                        });

                    });

                document
                    .getElementById('playBtn')
                    .addEventListener('click', replayJourney);

            })
            .catch(error => {
                console.error('JSON LOAD ERROR:', error);
            });

        function buildTimeline(data) {

            const timeline =
                document.getElementById('timeline');

            timeline.innerHTML = '';

            data.forEach(day => {

                const div =
                    document.createElement('div');

                div.className = 'timeline-item';

                if (day.Date === selectedDate) {
                    div.classList.add('active');
                }

                div.innerText =
                    day.Date + ' - ' + day.City;

                div.onclick = () => {

                    selectedDate = day.Date;

                    buildTimeline(data);

                    renderMap();

                };

                timeline.appendChild(div);

            });

            setTimeout(() => {
                scrollTimelineToActive();
            }, 50);

        }

        function scrollTimelineToActive() {

            const active =
                document.querySelector('.timeline-item.active');

            if (!active) return;

            active.scrollIntoView({
                behavior: 'smooth',
                inline: 'center',
                block: 'nearest'
            });

        }

        function replayJourney() {

            let i = 0;

            const interval = setInterval(() => {

                if (i >= tripData.length) {

                    clearInterval(interval);
                    return;

                }

                selectedDate = tripData[i].Date;

                buildTimeline(tripData);

                renderMap();

                i++;

            }, 1800);

        }

        function renderMap() {

            if (routeLayer) {
                map.removeLayer(routeLayer);
            }

            if (markerLayer) {
                map.removeLayer(markerLayer);
            }

            markerLayer = L.layerGroup().addTo(map);

            const selectedTravelers =
                Array.from(
                    document.querySelectorAll(
                        'input[type=checkbox]:checked'
                    )
                ).map(cb => cb.value);

            const filtered =
                tripData.filter(day =>
                    day.Travelers.some(t =>
                        selectedTravelers.includes(t)
                    )
                );

            // CUSTOM JOURNEY ORDER
            const journeyRoute = [

                {
                    city: 'Zurich',
                    lat: 47.3769,
                    lng: 8.5417
                },

                {
                    city: 'Lucerne',
                    lat: 47.0502,
                    lng: 8.3093
                },

                {
                    city: 'Grindelwald',
                    lat: 46.6242,
                    lng: 8.0414
                },

                {
                    city: 'Ortisei',
                    lat: 46.5753,
                    lng: 11.6713
                },

                {
                    city: 'Innsbruck',
                    lat: 47.2692,
                    lng: 11.4041
                },

                {
                    city: 'Verona',
                    lat: 45.4384,
                    lng: 10.9916
                },

                {
                    city: 'Pisa',
                    lat: 43.7228,
                    lng: 10.4017
                },

                {
                    city: 'Florence',
                    lat: 43.7696,
                    lng: 11.2558
                },

                {
                    city: 'Rome',
                    lat: 41.9028,
                    lng: 12.4964
                },

                {
                    city: 'Bari',
                    lat: 41.1171,
                    lng: 16.8719
                },

                {
                    city: 'Nafplio',
                    lat: 37.5673,
                    lng: 22.8016
                },

                {
                    city: 'Athens',
                    lat: 37.9838,
                    lng: 23.7275
                }

            ];

            const coords =
                journeyRoute.map(p => [p.lat, p.lng]);

            filtered.forEach(day => {

                const isCurrent =
                    day.Date === selectedDate;

                let markerClass = 'standard-marker';

                if (isCurrent) {
                    markerClass = 'current-marker';
                }
                else if (currentMode === 'journey') {
                    markerClass = 'journey-marker';
                }
                else if (currentMode === 'dashboard') {
                    markerClass = 'dashboard-marker';
                }

                const icon = L.divIcon({
                    className: '',
                    html: `<div class="${markerClass}"></div>`,
                    iconSize: [22, 22]
                });

                const marker = L.marker(
                    [day.Latitude, day.Longitude],
                    { icon }
                );

                marker.bindPopup(`
            <strong>${day.Title}</strong><br>
            ${day.City}, ${day.Country}
        `);

                marker.addTo(markerLayer);

                if (isCurrent) {

                    marker.openPopup();

                    renderPanel(day);

                }

                marker.on('click', () => {

                    selectedDate = day.Date;

                    buildTimeline(tripData);

                    renderMap();

                });

            });

            routeLayer = L.polyline(coords, {

                color:
                    currentMode === 'journey'
                        ? '#28a745'
                        : currentMode === 'dashboard'
                            ? '#6f42c1'
                            : '#3D95CE',

                weight:
                    currentMode === 'journey'
                        ? 6
                        : 4,

                opacity: .85

            }).addTo(map);

            map.fitBounds(
                routeLayer.getBounds(),
                {
                    padding: [40, 40]
                }
            );

        }

        if (routeLayer) {
            map.removeLayer(routeLayer);
        }

        if (markerLayer) {
            map.removeLayer(markerLayer);
        }

        markerLayer = L.layerGroup().addTo(map);

        const selectedTravelers =
            Array.from(
                document.querySelectorAll(
                    'input[type=checkbox]:checked'
                )
            ).map(cb => cb.value);

        const filtered =
            tripData.filter(day =>
                day.Travelers.some(t =>
                    selectedTravelers.includes(t)
                )
            );

        const coords = [];

        filtered.forEach(day => {

            coords.push([
                day.Latitude,
                day.Longitude
            ]);

            const isCurrent =
                day.Date === selectedDate;

            let markerClass = 'standard-marker';

            if (isCurrent) {
                markerClass = 'current-marker';
            }
            else if (currentMode === 'journey') {
                markerClass = 'journey-marker';
            }
            else if (currentMode === 'dashboard') {
                markerClass = 'dashboard-marker';
            }

            const icon = L.divIcon({
                className: '',
                html: `<div class="${markerClass}"></div>`,
                iconSize: [22, 22]
            });

            const marker = L.marker(
                [day.Latitude, day.Longitude],
                { icon }
            );

            marker.bindPopup(`
            <strong>${day.Title}</strong><br>
            ${day.City}, ${day.Country}
        `);

            marker.addTo(markerLayer);

            if (isCurrent) {
                marker.openPopup();
                renderPanel(day);
            }

            marker.on('click', () => {

                selectedDate = day.Date;

                buildTimeline(tripData);

                renderMap();

            });

        });

        routeLayer = L.polyline(coords, {

            color:
                currentMode === 'journey'
                    ? '#28a745'
                    : currentMode === 'dashboard'
                        ? '#6f42c1'
                        : '#3D95CE',

            weight:
                currentMode === 'journey'
                    ? 6
                    : 4,

            opacity: .85

        }).addTo(map);

        map.fitBounds(
            routeLayer.getBounds(),
            {
                padding: [40, 40]
            }
        );



        function renderPanel(day) {
            if (window.innerWidth <= 640) {
                const card = document.getElementById('mobileDayCard');
                const sheet = document.getElementById('mobileSheetContent');
                if (card) {
                    card.innerHTML = `<strong>${day.City}</strong><br>👣 ${day.Steps?.toLocaleString() || 0} &nbsp; 📷 ${(day.Photos || []).length} &nbsp; 🎥 ${((day.Video && day.Video.Enabled) ? 1 : 0)}`;
                }
                if (sheet) {
                    sheet.innerHTML = `<h3>${day.Title}</h3><p><strong>${day.City}, ${day.Country}</strong></p><p>${day.Transportation?.Description || ''}</p>`;
                }
                return;
            }

            const panel =
                document.getElementById('sidePanel');

            panel.classList.add('active');

            let html = `

    <button
        onclick="closePanel()"
        class="lightbox-btn mobile-close-btn"
        style="width:100%; margin-bottom:12px;">
        Close
    </button>

    <h2>${day.Title}</h2>

    <p>
    <strong>${day.City}, ${day.Country}</strong>
    </p>

    <p>
    ${day.Transportation.Icon}
    ${day.Transportation.Description}
    </p>

    <div class="stats">

        <div class="stat-card">
        Mission Day:
        ${day.MissionDay ? 'Yes' : 'No'}
        </div>

        <div class="stat-card">
        Travelers:
        ${day.Travelers.length}
        </div>

        <div
            class="stat-card"
            title="The number of steps walked on this day.">
        Steps:
        ${day.Steps?.toLocaleString() || 0}
        </div>

    </div>

    `;

            if (currentMode === 'journey') {

                html += `
        <hr>

        <h3>Journey Mode</h3>

        <p>
        Interactive storytelling mode with
        route progression and travel visualization.
        </p>
        `;

            }

            if (currentMode === 'dashboard') {

                html += `

        <hr>

        <h3>Mission Dashboard</h3>

        ${day.MissionDay
                        ? `
        <p>
        <a href="devotional.html?day=${parseInt(String(day.Date).split('-')[2], 10)}">
            View Devotional
        </a>
        </p>
        `
                        : ''}

        <p>
        <a href="dayactivities.html?day=${day.Date}">
            View Updates
        </a>
        </p>

        `;

            }



            if (day.Video && day.Video.Enabled) {

                html += `

        <hr>

        <h3>Trip Video</h3>

        <button
            class="lightbox-btn"
            onclick="openVideoPopup('${day.Video.File}')">

            ▶ ${day.Video.Title}

        </button>

        `;

            }

            if (day.Photos && day.Photos.length > 0) {

                html += '<div class="photo-grid">';

                day.Photos.forEach((photo, index) => {

                    html += `
            <img
                src="${photo.Image}"
                alt="Trip Photo"
                onclick="openLightbox(${index})"
            >
            `;

                });

                html += '</div>';

                currentLightboxPhotos = day.Photos;

            }
            else {

                html += `

        <hr>

        <h3>Optional Photos</h3>

        <p>
        No photos uploaded for this day yet.
        </p>

        `;

            }

            panel.innerHTML = html;

            if (window.innerWidth <= 640) {
                const card = document.getElementById('mobileDayCard');
                const sheet = document.getElementById('mobileSheetContent');

                if (card) {
                    const photos = (day.Photos || []).length;
                    const video = (day.Video && day.Video.Enabled) ? 1 : 0;
                    card.innerHTML = `<strong>${day.City}</strong><br>👣 ${day.Steps?.toLocaleString() || 0} &nbsp; 📷 ${photos} &nbsp; 🎥 ${video}`;
                }

                if (sheet) {
                    sheet.innerHTML = `
                        <h3>${day.Title}</h3>
                        <p><strong>${day.City}, ${day.Country}</strong></p>
                        <p>${day.Transportation.Description}</p>
                        <p>📷 ${(day.Photos || []).length} Photos</p>
                        <p>🎥 ${((day.Video && day.Video.Enabled) ? 1 : 0)} Videos</p>
                    `;
                }
            }

        }

        function openLightbox(index) {

            currentLightboxIndex = index;

            document
                .getElementById('lightboxOverlay')
                .classList.add('active');

            updateLightboxImage();

        }
        function closePanel() {

            document
                .getElementById('sidePanel')
                .classList.remove('active');

        }
        function closeLightbox() {

            document
                .getElementById('lightboxOverlay')
                .classList.remove('active');

        }

        function openVideoPopup(videoPath) {

            const overlay =
                document.getElementById('videoOverlay');

            const video =
                document.getElementById('popupVideo');

            const source =
                document.getElementById('popupVideoSource');

            source.src = videoPath;

            video.load();

            overlay.classList.add('active');

        }

        function closeVideoPopup() {

            const overlay =
                document.getElementById('videoOverlay');

            const video =
                document.getElementById('popupVideo');

            video.pause();

            overlay.classList.remove('active');

        }

        function updateLightboxImage() {

            const image =
                document.getElementById('lightboxImage');

            image.src =
                currentLightboxPhotos[
                    currentLightboxIndex
                ].Image;

        }

        function prevImage() {

            currentLightboxIndex--;

            if (currentLightboxIndex < 0) {
                currentLightboxIndex =
                    currentLightboxPhotos.length - 1;
            }

            updateLightboxImage();

        }

        function nextImage() {

            currentLightboxIndex++;

            if (currentLightboxIndex >= currentLightboxPhotos.length) {
                currentLightboxIndex = 0;
            }

            updateLightboxImage();

        }

        document.addEventListener('keydown', e => {

            const overlay =
                document.getElementById('lightboxOverlay');

            if (!overlay.classList.contains('active')) {
                return;
            }

            if (e.key === 'Escape') {
                closeLightbox();
            }

            if (e.key === 'ArrowLeft') {
                prevImage();
            }

            if (e.key === 'ArrowRight') {
                nextImage();
            }

        });


        /* MOBILE APP UX */
        if (window.innerWidth <= 640) {
            document.addEventListener('click', function (e) {
                if (e.target.id === 'mobileControlsBtn') {
                    const controls = document.querySelector('.controls');
                    controls.classList.toggle('mobile-controls-open');
                }
            });
        }

    </script>


    <script id="v80-mobile-controller">
        document.addEventListener('click', function(e){

        const tab=e.target.closest('.mobile-tab');
        if(tab){
        document.querySelectorAll('.mobile-tab').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');

        const day = (window.tripData || []).find(d => d.Date === selectedDate);
        const sheet = document.getElementById('mobileSheetContent');
        if(!day || !sheet) return;

        if(tab.dataset.tab==='overview'){
        sheet.innerHTML=`
        <h3>${day.Title}</h3>
        <p><strong>${day.City}, ${day.Country}</strong></p>
        <p>${day.Transportation?.Description || ''}</p>
        <p>📷 ${(day.Photos||[]).length} Photos</p>
        <p>🎥 ${((day.Video && day.Video.Enabled)?1:0)} Videos</p>`;
        }

        if(tab.dataset.tab==='photos'){

        currentLightboxPhotos = day.Photos || [];

        sheet.innerHTML =
        '<div class="photo-grid">' +
            currentLightboxPhotos.map((p,i)=>
            '<img src="' + p.Image +
         '" onclick="openLightbox(' + i + ')">'
            ).join('') +
            '</div>';
        }

        if(tab.dataset.tab==='video'){
        sheet.innerHTML=(day.Video&&day.Video.Enabled)
        ? '<button class="lightbox-btn" onclick="openVideoPopup(\''+day.Video.File+'\')">▶ '+day.Video.Title+'</button>'
        : '<p>No video available.</p>';
        }

        if(tab.dataset.tab==='mission'){
        sheet.innerHTML='<p>Mission Day: '+(day.MissionDay?'Yes':'No')+'</p>';
        }
        }

        const handle=e.target.closest('.mobile-sheet-handle');
        const card=e.target.closest('#mobileDayCard');
        if(handle || card){
        const s=document.getElementById('mobileSheet');
        s.classList.toggle('sheet-full');
        s.classList.toggle('sheet-collapsed');
        }
        });
        </script>
</body>




</html>
